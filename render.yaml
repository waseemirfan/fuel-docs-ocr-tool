services:
  - type: web
    name: fuel-docs-ocr-tool-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/ocr.db
      - key: PYTHON_VERSION
        value: "3.11.0"
