services:
  - type: web
    name: fuel-docs-ocr-tool-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard (never stored in git)
      - key: LLM_PROVIDER
        value: gemini
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/ocr.db
      - key: PYTHON_VERSION
        value: "3.11.0"
